# ─────────────────────────────────────────────────────────────────────────────
# RNV Manager - Añadir esto al bloque server{} de tu nginx en el host
# (el que maneja el SSL para rnv.renace.tech)
# ─────────────────────────────────────────────────────────────────────────────

# Go API — todas las llamadas /api/* van al backend Go
location /api/ {
    proxy_pass         http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # WebSocket para SSH terminal interactiva
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";

    # Timeouts largos: sesiones SSH y backups pueden tardar
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_connect_timeout 30s;
}

# Next.js frontend — todo lo demás
location / {
    proxy_pass         http://127.0.0.1:4200;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_read_timeout 60s;
}
