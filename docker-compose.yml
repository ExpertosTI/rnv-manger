version: '3.8'

# RNV Manager - Stack: PostgreSQL + Go API + Next.js
# Traefik handles routing/SSL via RenaceNet overlay network
services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-rnvadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rnv_secure_password_2025}
      POSTGRES_DB: ${DB_NAME:-rnv_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rnvadmin} -d ${DB_NAME:-rnv_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # ── Go API Backend ─────────────────────────────────────────────────────────
  go-api:
    image: rnv-manger-go-api:latest
    build:
      context: ./rnv-go-api
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rnvadmin}:${DB_PASSWORD:-rnv_secure_password_2025}@db:5432/${DB_NAME:-rnv_manager}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-rnv-super-secret-jwt-key-change-in-production}
      PORT: 8080
      GIN_MODE: release
      APP_URL: ${APP_URL:-https://rnv.renace.tech}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default
      - RenaceNet
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=RenaceNet"
        - "traefik.http.routers.rnv-api.rule=Host(`rnv.renace.tech`) && PathPrefix(`/api`)"
        - "traefik.http.routers.rnv-api.entrypoints=websecure"
        - "traefik.http.routers.rnv-api.tls=true"
        - "traefik.http.routers.rnv-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.rnv-api.loadbalancer.server.port=8080"
        - "traefik.http.routers.rnv-api.priority=100"

  # ── Next.js Frontend (UI) ──────────────────────────────────────────────────
  app:
    image: rnv-manger-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default
      - RenaceNet
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=RenaceNet"
        - "traefik.http.routers.rnv-app.rule=Host(`rnv.renace.tech`)"
        - "traefik.http.routers.rnv-app.entrypoints=websecure"
        - "traefik.http.routers.rnv-app.tls=true"
        - "traefik.http.routers.rnv-app.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.rnv-app.loadbalancer.server.port=3000"
        - "traefik.http.routers.rnv-app.priority=50"

  # ── Daily DB Backup ────────────────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    environment:
      PGHOST: db
      PGUSER: ${DB_USER:-rnvadmin}
      PGPASSWORD: ${DB_PASSWORD:-rnv_secure_password_2025}
      PGDATABASE: ${DB_NAME:-rnv_manager}
    volumes:
      - ./backups:/backups
    entrypoint: /bin/sh
    command: >
      -c "
        while true; do
          pg_dump -Fc > /backups/rnv_manager_$$(date +%Y%m%d_%H%M%S).dump
          ls -t /backups/*.dump 2>/dev/null | tail -n +8 | xargs -r rm
          sleep 86400
        done
      "
    networks:
      - default

networks:
  default:
    driver: overlay
    attachable: true
  RenaceNet:
    external: true

volumes:
  postgres_data:
    name: rnv_postgres_data
